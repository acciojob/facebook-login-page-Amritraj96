<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="left-section">
            <h1 class="logo">facebook</h1>
            <h2 class="description">Facebook helps you connect and share with the people in your life.</h2>
        </div>

        <div class="right-section">
            <div class="login-card">
                <form>
                    <input type="text" placeholder="Email address or phone number" required>
                    <input type="password" placeholder="Password" required>
                    <button type="submit" class="login-btn">Log in</button>
                </form>
                <a href="#" class="forgot-link">Forgotten account?</a>
                <hr class="divider">
                <div class="create-account-container">
                    <button type="button" class="create-btn">Create new account</button>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="./script.js"></script>
</body>
</html>
